services:
  - type: web
    name: lol-api
    runtime: node
    buildCommand: npm install && npm run build -w packages/shared && npm run build -w packages/api
    startCommand: node packages/api/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "3001"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
